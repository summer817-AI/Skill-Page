<svg width="720" height="480" viewBox="0 0 720 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b2146"/>
      <stop offset="100%" stop-color="#3a2f6b"/>
    </linearGradient>
    <radialGradient id="shell" cx="45%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffd6ea"/>
      <stop offset="52%" stop-color="#ff9ecf"/>
      <stop offset="100%" stop-color="#f26ab3"/>
    </radialGradient>
    <linearGradient id="crystal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#b8f3ff" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="720" height="480" fill="url(#bg)"/>
  <ellipse cx="360" cy="420" rx="190" ry="26" fill="#89e5ff" opacity="0.25" filter="url(#soft)"/>

  <!-- arms -->
  <g fill="url(#shell)">
    <ellipse cx="220" cy="230" rx="56" ry="74" transform="rotate(-20 220 230)"/>
    <ellipse cx="500" cy="230" rx="56" ry="74" transform="rotate(20 500 230)"/>
  </g>

  <!-- claws -->
  <g fill="url(#shell)">
    <path d="M130 170 C88 152 80 114 112 96 C146 78 190 97 198 138 C205 178 169 189 130 170 Z"/>
    <path d="M590 170 C632 152 640 114 608 96 C574 78 530 97 522 138 C515 178 551 189 590 170 Z"/>
  </g>

  <!-- body -->
  <ellipse cx="360" cy="248" rx="150" ry="128" fill="url(#shell)"/>
  <ellipse cx="360" cy="272" rx="112" ry="88" fill="#ffb0d8" opacity="0.85"/>

  <!-- tail -->
  <g fill="#ff8fc7">
    <ellipse cx="360" cy="360" rx="70" ry="34"/>
    <ellipse cx="360" cy="390" rx="54" ry="24"/>
  </g>

  <!-- legs -->
  <g stroke="#ff9bcb" stroke-width="10" stroke-linecap="round" opacity="0.8">
    <line x1="260" y1="310" x2="210" y2="350"/>
    <line x1="290" y1="325" x2="250" y2="368"/>
    <line x1="460" y1="310" x2="510" y2="350"/>
    <line x1="430" y1="325" x2="470" y2="368"/>
  </g>

  <!-- eyes -->
  <g>
    <circle cx="318" cy="220" r="17" fill="#2f234d"/>
    <circle cx="402" cy="220" r="17" fill="#2f234d"/>
    <circle cx="324" cy="214" r="5" fill="#fff"/>
    <circle cx="408" cy="214" r="5" fill="#fff"/>
  </g>

  <!-- smile -->
  <path d="M332 266 Q360 286 388 266" stroke="#e35197" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- crystal highlights -->
  <g fill="url(#crystal)">
    <path d="M290 150 L336 174 L308 210 L266 186 Z"/>
    <path d="M430 178 L468 196 L448 232 L410 214 Z"/>
    <path d="M350 300 L392 316 L370 348 L330 334 Z"/>
  </g>

  <text x="360" y="64" text-anchor="middle" fill="#ffd8ef" font-size="30" font-family="'PingFang SC','Microsoft YaHei',sans-serif">果果子 · 水晶小龙虾</text>
</svg>